<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101214" />
    <title>Ставь угольки — владелец</title>
    <link rel="stylesheet" href="/assets/css/admin.css" />
  </head>
  <body>
    <section class="login-screen" id="loginScreen">
      <div class="login-card">
        <img class="login-logo" src="/assets/brand/logo.jpg" alt="Ставь угольки" />
        <div class="login-title">Ставь угольки</div>
        <form class="login-form" id="loginForm">
          <input class="field" type="text" name="username" placeholder="Логин" required />
          <input class="field" type="password" name="password" placeholder="Пароль" required />
          <button class="primary-button" type="submit">Войти</button>
        </form>
        <div class="notice" id="loginNotice"></div>
      </div>
    </section>

    <div class="admin-app hidden" id="adminApp">
      <header class="admin-topbar">
        <div class="admin-brand">
          <img class="topbar-logo" src="/assets/brand/logo.jpg" alt="Ставь угольки" />
          <div>
            <div class="topbar-title">Ставь угольки</div>
            <div class="topbar-subtitle">владелец</div>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="ghost-button" id="refreshButton" type="button">Обновить</button>
          <button class="ghost-button" id="logoutButton" type="button">Выйти</button>
        </div>
      </header>

      <div class="admin-layout">
        <aside class="admin-sidebar">
          <button class="tab-button is-active" type="button" data-tab="products">Товары</button>
          <button class="tab-button" type="button" data-tab="banners">Баннеры</button>
          <button class="tab-button" type="button" data-tab="orders">Заказы</button>
          <button class="tab-button" type="button" data-tab="analytics">Аналитика</button>
          <button class="tab-button" type="button" data-tab="settings">Настройки</button>
        </aside>

        <main class="admin-main">
          <section class="panel" data-panel="products">
            <div class="panel-head">
              <h1>Товары</h1>
              <button class="primary-button" id="newProductButton" type="button">Новый</button>
            </div>
            <div class="two-col-layout">
              <div class="panel-card">
                <input class="field" id="productSearchInput" type="search" placeholder="Поиск" />
                <div class="item-list" id="productList"></div>
              </div>
              <div class="panel-card">
                <form class="editor-form" id="productForm">
                  <input type="hidden" name="id" />
                  <input class="field" name="name" type="text" placeholder="Название" required />
                  <select class="field" name="category">
                    <option value="Уголь">Уголь</option>
                    <option value="Табак">Табак</option>
                    <option value="Кальяны">Кальяны</option>
                    <option value="Прочее">Прочее</option>
                  </select>
                  <input class="field" name="price" type="number" min="0" step="1" placeholder="Цена" />
                  <input class="field" name="image" type="text" placeholder="Изображение" />
                  <input class="field" name="deepLink" type="text" placeholder="Deep link" />
                  <input class="field" name="slug" type="text" placeholder="Slug" />
                  <input class="field" name="stockCount" type="number" min="0" step="1" placeholder="Остаток" />
                  <input class="field" name="unit" type="text" placeholder="Ед. изм." />
                  <textarea class="field textarea" name="description" placeholder="Описание"></textarea>
                  <label class="check-row"><input type="checkbox" name="inStock" /> В наличии</label>
                  <label class="check-row"><input type="checkbox" name="featured" /> Показать первым</label>
                  <div class="button-row">
                    <button class="primary-button" type="submit">Сохранить</button>
                    <button class="ghost-button" id="deleteProductButton" type="button">Удалить</button>
                    <button class="ghost-button" id="resetProductButton" type="button">Сбросить</button>
                  </div>
                </form>
                <div class="notice" id="productNotice"></div>
              </div>
            </div>
          </section>

          <section class="panel hidden" data-panel="banners">
            <div class="panel-head">
              <h1>Баннеры</h1>
              <button class="primary-button" id="newBannerButton" type="button">Новый</button>
            </div>
            <div class="two-col-layout">
              <div class="panel-card">
                <div class="item-list" id="bannerList"></div>
              </div>
              <div class="panel-card">
                <form class="editor-form" id="bannerForm">
                  <input type="hidden" name="id" />
                  <input class="field" name="image" type="text" placeholder="Изображение" required />
                  <input class="field" name="link" type="text" placeholder="Ссылка" />
                  <input class="field" name="sortOrder" type="number" min="0" step="1" placeholder="Порядок" />
                  <label class="check-row"><input type="checkbox" name="active" /> Активен</label>
                  <div class="banner-preview-wrap">
                    <img class="banner-preview" id="bannerPreview" alt="Баннер" />
                  </div>
                  <div class="button-row">
                    <button class="primary-button" type="submit">Сохранить</button>
                    <button class="ghost-button" id="deleteBannerButton" type="button">Удалить</button>
                    <button class="ghost-button" id="resetBannerButton" type="button">Сбросить</button>
                  </div>
                </form>
                <div class="notice" id="bannerNotice"></div>
              </div>
            </div>
          </section>

          <section class="panel hidden" data-panel="orders">
            <div class="panel-head">
              <h1>Заказы</h1>
            </div>
            <div class="panel-card">
              <div class="item-list orders-list" id="ordersList"></div>
            </div>
          </section>

          <section class="panel hidden" data-panel="analytics">
            <div class="panel-head">
              <h1>Аналитика</h1>
            </div>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="two-col-layout analytics-layout">
              <div class="panel-card">
                <h2>Топ товары</h2>
                <div class="item-list" id="topProductsList"></div>
              </div>
              <div class="panel-card">
                <h2>Категории</h2>
                <div class="item-list" id="categoryRevenueList"></div>
              </div>
            </div>
          </section>

          <section class="panel hidden" data-panel="settings">
            <div class="panel-head">
              <h1>Настройки</h1>
            </div>
            <div class="panel-card">
              <form class="editor-form" id="settingsForm">
                <input class="field" name="storeName" type="text" placeholder="Название" />
                <input class="field" name="currency" type="text" placeholder="Валюта" />
                <input class="field" name="supportTelegram" type="text" placeholder="Telegram поддержки" />
                <input class="field" name="supportPhone" type="text" placeholder="Телефон" />
                <input class="field" name="pickupAddress" type="text" placeholder="Адрес" />
                <input class="field" name="minOrder" type="number" min="0" step="1" placeholder="Минимум" />
                <input class="field" name="deliveryPrice" type="number" min="0" step="1" placeholder="Доставка" />
                <input class="field" name="freeDeliveryFrom" type="number" min="0" step="1" placeholder="Бесплатно от" />
                <input class="field" name="accent" type="text" placeholder="Accent" />
                <input class="field" name="accentWarm" type="text" placeholder="Warm accent" />
                <button class="primary-button" type="submit">Сохранить</button>
              </form>
              <div class="notice" id="settingsNotice"></div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="/assets/js/admin.js" defer></script>
  </body>
</html>
